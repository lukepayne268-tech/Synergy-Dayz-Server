<body class="bg-dark text-light">

    <!-- Navbar -->
    <nav class="navbar navbar-dark navbar-expand-lg bg-black fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">Synergy DayZ</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#about">About</a></li>
                    <li class="nav-item"><a class="nav-link" href="#mods">Mods</a></li>
                    <li class="nav-item"><a class="nav-link" href="#rules">Rules</a></li>
                    <li class="nav-item"><a class="nav-link" href="#discord">Discord</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="hero d-flex align-items-center justify-content-center text-center">
        <div>
            <h1 class="display-3 fw-bold">Synergy DAYZ</h1>
            <p class="lead">The Ultimate Vanilla+ ecperience</p>
            <a href="steam://connect/YOURIP:PORT" class="btn btn-danger btn-lg mt-3">Join our community</a>
        </div>
    </header>

    <!-- About Section -->
    <section id="about" class="container py-5">
        <h2 class="mb-4">About the Server</h2>
        <p>
            This server provides a pure vanilla DayZ experience with carefully selected immersion 
            and quality-of-life mods. No pay-to-win, no boosted loot, just survival the way it was meant to be.
        </p>

        <ul>
            <li>Map: Chernarus</li>
            <li>Persistence: Enabled</li>
            <li>Restarts: Every 4 hours</li>
            <li>Wipes: As needed</li>
        </ul>
    </section>

    <!-- Mods Section -->
    <section id="mods" class="container py-5">
        <h2 class="mb-4">Mod List</h2>

        <div class="list-group">
            <div class="list-group-item bg-dark text-light border-secondary">CF – Core Framework</div>
            <div class="list-group-item bg-dark text-light border-secondary">VPP Admin Tools – Admin utilities</div>
            <div class="list-group-item bg-dark text-light border-secondary">Better Stamina – Immersion tweak</div>
            <div class="list-group-item bg-dark text-light border-secondary">No Glowing Items – Realistic lighting</div>
            <div class="list-group-item bg-dark text-light border-secondary">Ear Plugs – QoL audio control</div>
        </div>
    </section>

    <!-- Rules Section -->
    <section id="rules" class="container py-5">
        <h2 class="mb-4">Server Rules</h2>

        <ul class="list-group">
            <li class="list-group-item bg-dark text-light border-secondary">No cheating or exploiting</li>
            <li class="list-group-item bg-dark text-light border-secondary">No racism or hate speech</li>
            <li class="list-group-item bg-dark text-light border-secondary">No griefing bases</li>
            <li class="list-group-item bg-dark text-light border-secondary">Combat logging is not allowed</li>
        </ul>
    </section>

    <!-- Discord Section -->
    <section id="discord" class="container py-5 text-center">
        <h2 class="mb-4">Join Our Community</h2>
        <p>Stay updated, report issues, and meet other survivors.</p>

        <!-- Replace with your Discord widget -->
        <a href="YOUR_DISCORD_INVITE" class="btn btn-primary btn-lg">Join Discord</a>

    <!-- Footer -->
    <footer class="text-center py-4 bg-black">
        <p class="mb-0">© 2026 Your Server Name — Survive the Apocalypse</p>
    </footer>
